<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calc">
      <!-- Top Bar -->
      <div class="topbar">
        <span class="topbar-title">✦ CALC PRO</span>
        <div class="dots">
          <div class="dot dot-red"></div>
          <div class="dot dot-amber"></div>
          <div class="dot dot-purple"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-mode="std">
          Standard
      </button>
      
        <button class="tab active" data-mode="sci">
          Scientific
        </button>
        <button class="tab active" data-mode="hist">
          History
        </button>
      </div>

      <!-- Display -->
      <div class="display">
        <div class="expr-line" id="expr"></div>
        <div class="result-line" id="result">0</div>
        <div class="badges">
          <span class="badge badge-mem" id="mem-badge">MEM: 0</span>
          <span class="badge badge-ans" id="ans-badge">ANS: —</span>
          <span class="badge badge-deg" id="deg-badge" onclick="toggleDeg()"
            >DEG</span
          >
        </div>
      </div>

      <!-- Memory Row -->
      <div class="mem-row">
        <div class="btn-mem" onclick="pressMem('MC')">MC</div>
        <div class="btn-mem" onclick="pressMem('MR')">MR</div>
        <div class="btn-mem" onclick="pressMem('MS')">MS</div>
        <div class="btn-mem" onclick="pressMem('M+')">M+</div>
        <div class="btn-mem" onclick="pressMem('M-')">M−</div>
      </div>

      <div class="divider"></div>

      <!-- Scientific Section -->
      <div id="sci-section" class="section-hidden">
        <div class="inv-row">
          <span class="inv-label">Scientific Functions</span>
          <label class="inv-toggle">
            <input type="checkbox" id="inv-chk" onchange="toggleInv()" /> INV
          </label>
        </div>
        <div class="sci-grid">
          <button class="btn-sci" data-science="sin">sin</button>
          <button class="btn-sci" data-science="cos">cos</button>
          <button class="btn-sci" data-science="tan">tan</button>
          <button class="btn-sci" data-science="log">log</button>
          <button class="btn-sci" data-science="ln">ln</button>
          <button class="btn-sci" data-science="sqrt">√x</button>
          <button class="btn-sci" data-science="sq" onclick="pressSci('sq')">
            x²
          </button>
          <button
            class="btn-sci"
            data-science="cube"
            onclick="pressSci('cube')"
          >
            x³
          </button>
          <button class="btn-sci" data-science="pow" onclick="pressSci('pow')">
            xⁿ
          </button>
          <button
            class="btn-sci"
            data-science="cbrt"
            onclick="pressSci('cbrt')"
          >
            ∛x
          </button>
          <button class="btn-sci" data-constant="pi">π</button>
          <button class="btn-sci" data-constant="e">e</button>
          <button
            class="btn-sci"
            data-science="inv_x"
            onclick="pressSci('inv_x')"
          >
            1/x
          </button>
          <button class="btn-sci" data-science="abs" onclick="pressSci('abs')">
            |x|
          </button>
          <button
            class="btn-sci"
            data-science="fact"
            onclick="pressSci('fact')"
          >
            n!
          </button>
        </div>
        <div class="divider"></div>
      </div>

      <!-- History Section -->
      <div id="hist-section" class="section-hidden">
        <div class="hist-header">
          <span class="hist-title">Recent Calculations</span>
          <button class="hist-clear-btn" onclick="clearHistory()">
            CLEAR ALL
          </button>
        </div>
        <div class="hist-panel" id="hist-panel">
          <div class="hist-empty" id="hist-empty">No calculations yet</div>
        </div>
        <div class="divider" style="margin-top: 8px"></div>
      </div>

      <!-- Main Buttons -->
      <div class="main-grid">
        <button class="btn btn-ac" data-clear="pressAC()">AC</button>
        <button class="btn btn-del" data-delete="pressDel()">⌫</button>
        <button class="btn btn-fn" data-percentage="pressFn('%')">%</button>
        <button class="btn btn-op" data-divide="pressOp('÷')">÷</button>

        <button class="btn btn-num" data-number="7">7</button>
        <button class="btn btn-num" data-number="8">8</button>
        <button class="btn btn-num" data-number="9">9</button>
        <button class="btn btn-op" data-operator="×">×</button>

        <button class="btn btn-num" data-number="4">4</button>
        <button class="btn btn-num" data-number="5">5</button>
        <button class="btn btn-num" data-number="6">6</button>
        <button class="btn btn-op" data-operator="−">−</button>

        <button class="btn btn-num" data-number="1">1</button>
        <button class="btn btn-num" data-number="2">2</button>
        <button class="btn btn-num" data-number="3">3</button>
        <button class="btn btn-op" data-operator="+">+</button>

        <button class="btn btn-num" data-number="0">0</button>

        <button class="btn btn-fn btn-zero" data-operator="pressFn('+/-')">
          +/−
        </button>
        <button class="btn btn-num" data-dot>.</button>
        <button class="btn btn-eq" data-equal="pressEq()">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
