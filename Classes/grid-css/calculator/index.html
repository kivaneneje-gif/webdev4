<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calc">
      <!-- Top Bar -->
      <div class="topbar">
        <span class="topbar-title">✦ CALC PRO</span>
        <div class="dots">
          <div class="dot dot-red"></div>
          <div class="dot dot-amber"></div>
          <div class="dot dot-purple"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchMode('std', this)">
          Standard
        </button>
        <button class="tab inactive" onclick="switchMode('sci', this)">
          Scientific
        </button>
        <button class="tab inactive" onclick="switchMode('hist', this)">
          History
        </button>
      </div>

      <!-- Display -->
      <div class="display">
        <div class="expr-line" id="expr"></div>
        <div class="result-line" id="result">0</div>
        <div class="badges">
          <span class="badge badge-mem" id="mem-badge">MEM: 0</span>
          <span class="badge badge-ans" id="ans-badge">ANS: —</span>
          <span class="badge badge-deg" id="deg-badge" onclick="toggleDeg()"
            >DEG</span
          >
        </div>
      </div>

      <!-- Memory Row -->
      <div class="mem-row">
        <div class="btn-mem" onclick="pressMem('MC')">MC</div>
        <div class="btn-mem" onclick="pressMem('MR')">MR</div>
        <div class="btn-mem" onclick="pressMem('MS')">MS</div>
        <div class="btn-mem" onclick="pressMem('M+')">M+</div>
        <div class="btn-mem" onclick="pressMem('M-')">M−</div>
      </div>

      <div class="divider"></div>

      <!-- Scientific Section -->
      <div id="sci-section" class="section-hidden">
        <div class="inv-row">
          <span class="inv-label">Scientific Functions</span>
          <label class="inv-toggle">
            <input type="checkbox" id="inv-chk" onchange="toggleInv()" /> INV
          </label>
        </div>
        <div class="sci-grid">
          <div class="btn-sci" id="s-sin" onclick="pressSci('sin')">sin</div>
          <div class="btn-sci" id="s-cos" onclick="pressSci('cos')">cos</div>
          <div class="btn-sci" id="s-tan" onclick="pressSci('tan')">tan</div>
          <div class="btn-sci" id="s-log" onclick="pressSci('log')">log</div>
          <div class="btn-sci" id="s-ln" onclick="pressSci('ln')">ln</div>
          <div class="btn-sci" id="s-sqrt" onclick="pressSci('sqrt')">√x</div>
          <div class="btn-sci" id="s-sq" onclick="pressSci('sq')">x²</div>
          <div class="btn-sci" id="s-cube" onclick="pressSci('cube')">x³</div>
          <div class="btn-sci" id="s-pow" onclick="pressSci('pow')">xⁿ</div>
          <div class="btn-sci" id="s-cbrt" onclick="pressSci('cbrt')">∛x</div>
          <div class="btn-sci" onclick="pressConst('pi')">π</div>
          <div class="btn-sci" onclick="pressConst('e')">e</div>
          <div class="btn-sci" onclick="pressSci('inv_x')">1/x</div>
          <div class="btn-sci" onclick="pressSci('abs')">|x|</div>
          <div class="btn-sci" onclick="pressSci('fact')">n!</div>
        </div>
        <div class="divider"></div>
      </div>

      <!-- History Section -->
      <div id="hist-section" class="section-hidden">
        <div class="hist-header">
          <span class="hist-title">Recent Calculations</span>
          <button class="hist-clear-btn" onclick="clearHistory()">
            CLEAR ALL
          </button>
        </div>
        <div class="hist-panel" id="hist-panel">
          <div class="hist-empty" id="hist-empty">No calculations yet</div>
        </div>
        <div class="divider" style="margin-top: 8px"></div>
      </div>

      <!-- Main Buttons -->
      <div class="main-grid">
        <button class="btn btn-ac" onclick="pressAC()">AC</button>
        <button class="btn btn-del" onclick="pressDel()">⌫</button>
        <button class="btn btn-fn" onclick="pressFn('%')">%</button>
        <button class="btn btn-op" onclick="pressOp('÷')">÷</button>

        <button class="btn btn-num" onclick="pressNum('7')">7</button>
        <button class="btn btn-num" onclick="pressNum('8')">8</button>
        <button class="btn btn-num" onclick="pressNum('9')">9</button>
        <button class="btn btn-op" onclick="pressOp('×')">×</button>

        <button class="btn btn-num" onclick="pressNum('4')">4</button>
        <button class="btn btn-num" onclick="pressNum('5')">5</button>
        <button class="btn btn-num" onclick="pressNum('6')">6</button>
        <button class="btn btn-op" onclick="pressOp('−')">−</button>

        <button class="btn btn-num" onclick="pressNum('1')">1</button>
        <button class="btn btn-num" onclick="pressNum('2')">2</button>
        <button class="btn btn-num" onclick="pressNum('3')">3</button>
        <button class="btn btn-op" onclick="pressOp('+')">+</button>

        <button class="btn btn-num" onclick="pressNum('0')">0</button>

        <button class="btn btn-fn btn-zero" onclick="pressFn('+/-')">
          +/−
        </button>
        <button class="btn btn-num" onclick="pressDot()">.</button>
        <button class="btn btn-eq" onclick="pressEq()">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
